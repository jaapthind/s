<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Interactive Link</title>
    <style>
        :root {
            --primary: #ff00cc;
            --secondary: #333399;
            --glow: rgba(255, 0, 204, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-15px) rotateX(5deg); }
            100% { transform: translateY(0px) rotateX(0deg); }
        }

        h1 {
            color: #ffffff;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.8);
            margin-bottom: 50px;
        }

        .btn-wrapper {
            position: relative;
            display: inline-block;
        }

        .btn-complex {
            position: relative;
            appearance: none;
            outline: none;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 25px 60px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 15px 25px rgba(0,0,0,0.5),
                0 20px 0 #11113a,
                inset 0 5px 10px rgba(255,255,255,0.4);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .btn-complex::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .btn-complex:hover {
            box-shadow: 
                0 20px 35px rgba(0,0,0,0.6),
                0 20px 0 #11113a,
                0 0 40px var(--glow),
                inset 0 5px 10px rgba(255,255,255,0.5);
            transform: translateY(-4px);
        }

        .btn-complex:active {
            box-shadow: 
                0 5px 10px rgba(0,0,0,0.4),
                0 0px 0 #11113a,
                0 0 60px var(--glow),
                inset 0 5px 15px rgba(0,0,0,0.6);
            transform: translateY(20px);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .loader {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border: 10px solid rgba(255,255,255,0.05);
            border-top: 10px solid #ff00cc;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            z-index: 100;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="loader" id="loader"></div>
    <div class="container" id="mainContainer">
        <h1>System Access</h1>
        <div class="btn-wrapper">
            <button class="btn-complex" id="magicButton">Initiate Link</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const REDIRECT_URL = "https://docs.google.com/presentation/d/1deNq0sp3cAuR0DAYS6xzVptMsRcpwXVfMCYZfALyW0g/edit?usp=sharing";
        const DELAY_MS = 1800; 

        // ==========================================
        // RIPPLE EFFECT GENERATOR
        // ==========================================
        const button = document.getElementById('magicButton');
        button.addEventListener('mousedown', function(e) {
            const x = e.clientX - e.target.getBoundingClientRect().left;
            const y = e.clientY - e.target.getBoundingClientRect().top;
            
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            
            const size = Math.max(this.clientWidth, this.clientHeight);
            ripple.style.width = ripple.style.height = `${size}px`;
            
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // ==========================================
        // AMBIENT PARTICLE ENGINE
        // ==========================================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height, particleArray;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, dx, dy, size, color) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.size = size;
                this.color = color;
                this.baseSize = size;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x + this.size > width || this.x - this.size < 0) this.dx = -this.dx;
                if (this.y + this.size > height || this.y - this.size < 0) this.dy = -this.dy;
                this.x += this.dx;
                this.y += this.dy;
                
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 120) {
                    if (this.size < this.baseSize * 4) this.size += 1.5;
                } else if (this.size > this.baseSize) {
                    this.size -= 0.2;
                }
                this.draw();
            }
        }

        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function initParticles() {
            particleArray = [];
            for (let i = 0; i < 200; i++) {
                let size = Math.random() * 3 + 1;
                let x = Math.random() * (innerWidth - size * 2) + size;
                let y = Math.random() * (innerHeight - size * 2) + size;
                let dx = (Math.random() - 0.5) * 1.5;
                let dy = (Math.random() - 0.5) * 1.5;
                let color = `rgba(255, 0, 204, ${Math.random() * 0.4 + 0.1})`;
                particleArray.push(new Particle(x, y, dx, dy, size, color));
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
            }
        }

        initParticles();
        animateParticles();

        // ==========================================
        // CLICK EXPLOSION & REDIRECT LOGIC
        // ==========================================
        button.addEventListener('click', () => {
            particleArray = [];
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 400; i++) {
                let size = Math.random() * 6 + 2;
                let speedX = (Math.random() - 0.5) * 35;
                let speedY = (Math.random() - 0.5) * 35;
                let color = `hsl(${Math.random() * 60 + 280}, 100%, 65%)`; 
                particleArray.push(new Particle(centerX, centerY, speedX, speedY, size, color));
            }

            setTimeout(() => {
                document.getElementById('mainContainer').style.display = 'none';
                document.getElementById('loader').style.display = 'block';
            }, 300);

            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, DELAY_MS);
        });
    </script>
</body>
</html>
